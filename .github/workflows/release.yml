name: Publish Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v0.2.2
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on:
      - self-hosted
      - windows
      - sts2
    env:
      STS2_GAME_DIR: ${{ vars.STS2_GAME_DIR }}
      STS2_GODOT_EXE: ${{ vars.STS2_GODOT_EXE }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-release.ps1 -Configuration Release -TagName $env:RELEASE_TAG -Upload

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CombatAutoHost-${{ env.RELEASE_TAG }}
          path: |
            dist/release/*.zip
            dist/installer/output/*.exe
